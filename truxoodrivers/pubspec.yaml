name: truxoo_partners
description: "Truxoo Driver Application"
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ">=2.17.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ---------------- Firebase ----------------
  firebase_core: ^3.6.0
  firebase_auth: ^5.2.0
  cloud_firestore: ^5.4.0
  firebase_storage: ^12.2.0
  

  # ---------------- Common Flutter packages ----------------
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.1.0
  dio: ^5.3.3
  flutter_polyline_points: ^2.1.0
  google_maps_flutter: ^2.5.0
  geolocator: ^10.1.0
  permission_handler: ^11.3.1
  url_launcher: ^6.1.14
  flutter_pdfview: ^1.3.0
  path_provider: ^2.1.1
  http: ^1.4.0
  image_picker: ^1.1.2
  shared_preferences: ^2.2.0
  intl: ^0.18.1
  back_button_interceptor: ^6.0.2
  carousel_slider: ^4.2.1
  share_plus: ^7.0.0
  widgets_to_image: ^2.0.0
  google_places_flutter: ^2.0.9
  flutter_dotenv: ^5.1.0
  logging: ^1.1.1
  flutter_local_notifications: ^17.2.2
  flutter_launcher_icons: ^0.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/
    - assets/onboarding_main.webp

flutter_icons:
  android: true
  ios: true
  image_path: "assets/play_store_512.png"
  remove_alpha_ios: true
  adaptive_icon_background: "assets/ic_launcher_background.png"
  adaptive_icon_foreground: "assets/ic_launcher_foreground.png"
